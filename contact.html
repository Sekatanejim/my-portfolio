<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Jim Malapane</ti tle>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
        }
        header {
            background-color:#333;
            color:white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span {
            font-size: 24px;
            font-weight: bold;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 5px 10px;
        }
        nav a:hover {
            background-color: #555;
            border-radius: 5px;
        }
        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .contact-info {
            flex: 1;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .contact-form {
            flex: 1;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .contact-info h1, .contact-form h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #ffaa00;
            display: inline-block;
            padding-bottom: 5px;
        }
        .info-item {
            margin: 25px 0;
        }
        .info-item h3 {
            color: #ffaa00;
            margin-bottom: 8px;
        }
        .info-item p, .info-item a {
            color: #555;
            text-decoration: none;
        }
        .info-item a:hover {
            color: #ffaa00;
            text-decoration: underline;
        }
        .social-links {
            margin-top: 20px;
        }
        .social-links a {
            display: inline-block;
            margin-right: 15px;
            padding: 8px 15px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .social-links a:hover {
            background-color: #ffaa00;
            color: #333;
        }
        form label {
            display: block;
            margin: 15px 0 5px;
            color: #333;
            font-weight: bold;
        }
        form input, form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        form button {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        form button:hover {
            background-color: #ffaa00;
            color: #333;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 40px;
        }
        footer a {
            color: #ffaa00;
            text-decoration: none;
            margin: 0 10px;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            .contact-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div style="width: 50px; height: 50px; background-color: #ffaa00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333;">JM</div>
        <span>Jim Malapane</span>
    </div>
    <nav>

                <p><a href="mailto:jimsekatane@gmail.com">jimsekatane@gmail.com</a></p>

        <div class="contact-form">

            <form action="#" method="post">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
                
                <label for="phone">Phone Number (optional)</label>
                <input type="tel" id="phone" name="phone">
                
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</main>

</html>
